<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Sign up Form</title>
  </head>
  <body>
    <div class="side">
      <aside>
        <div class="odin-logo">
          <img src="img/odin-logo.png" width="90px" />
          <span>Odin</span>
        </div>
        <div class="background"></div>
      </aside>
    </div>
    <div class="main">
      <div class="text-content">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. <br />
          Sign up now to get started.
        </p>
        <p>You <em>know</em> you want to.</p>
      </div>
      <div class="form-field">
        <form action="#" method="get">
          <legend>Let's do this!</legend>
          <div class="fields">
            <div>
              <label for="f-name">First Name</label>
              <input type="text" id="f-name" name="f-name" />
            </div>
            <div>
              <label for="l-name">Last Name</label>
              <input type="text" id="l-name" name="l-name" />
            </div>
            <div>
              <label for="email">Email</label>
              <input type="email" id="email" name="email" />
            </div>
            <div>
              <label for="phone">Phone Number</label>
              <input type="tel" name="phone" id="phone" />
            </div>
            <div>
              <label for="password">Password</label>
              <input type="password" name="password" id="password" required/>
            </div>
            <div>
              <label for="confirm-p">Confirm Password</label>
              <input type="password" name="confirm-p" id="confirm-p" required/>
            </div>
          </div>
        </form>
      </div>
      <div class="bottom">
        <button type="submit" id="create-account">Create Account</button>
        <p>Already have an account? <a href="/">Log in</a></p>
      </div>
    </div>
  </body>
</html>
